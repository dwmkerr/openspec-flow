# =============================================================================
# openspec-flow — reusable workflow (Action mode)
# =============================================================================
# Thin adapter over the same dispatch core the Probot App uses. A target
# repo's shim (.github/workflows/openspec-flow.yml, written by
# `openspec-flow init`) calls this via `uses:` at a pinned ref. This
# workflow checks out openspec-flow at that exact ref, builds it, and
# runs `openspec-flow dispatch`, which classifies the triggering event
# and routes it through the handler registry.
#
# Identity: when OPENSPEC_FLOW_APP_ID / OPENSPEC_FLOW_PRIVATE_KEY are
# provided, an App installation token is minted and commits attribute to
# openspec-flow[bot]. Otherwise the job falls back to GITHUB_TOKEN
# (commits attribute to github-actions[bot]).
# =============================================================================

# workflow_call only. The shim that `openspec-flow init` writes into the
# target repo carries the `on:` event triggers and calls this workflow via
# `uses:`. Keeping this file trigger-less means it never self-executes on
# the openspec-flow repo (whose own flow runs through the App), and the
# event-trigger contract lives in exactly one place — the shim template.
on:
  workflow_call:
    inputs:
      broker_url:
        description: |
          OIDC token broker URL. The shim is rendered with the URL of the
          Probot host that ran the install (Fly dev, Fly prod, or omitted
          for local-dev installs that should use the default below).
          Repo override path: set the `OPENSPEC_FLOW_BROKER_URL` Actions
          variable; that wins over this input.
        type: string
        required: false
        default: 'https://openspec-flow.fly.dev'
      broker_audience:
        description: |
          The `aud` claim the broker requires on the OIDC token. Must
          match `OPENSPEC_FLOW_BROKER_AUDIENCE` on the Probot host that
          will accept the token. Set at install time by `runAppInit`
          from the Probot's own audience env, so dev / prod brokers
          each get their own.
        type: string
        required: false
        default: 'openspec-flow'
    secrets:
      ANTHROPIC_API_KEY:
        description: Anthropic API key for the Claude agent.
        required: true
      OPENSPEC_FLOW_APP_ID:
        description: GitHub App id for bot identity (optional, legacy path).
        required: false
      OPENSPEC_FLOW_PRIVATE_KEY:
        description: GitHub App private key for bot identity (optional, legacy path).
        required: false

jobs:
  flow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Required for the OIDC broker path — without it, the runner does
      # not inject ACTIONS_ID_TOKEN_REQUEST_TOKEN/URL. The caller (shim)
      # also needs id-token: write at its own permissions block; the
      # shim template ships with it.
      id-token: write
    steps:
      # Check out openspec-flow at the exact ref the shim pinned, so the
      # local composite action (`./`) runs the same code version.
      # job_workflow_sha resolves the reusable workflow's own commit.
      - name: Checkout openspec-flow
        uses: actions/checkout@v4
        with:
          repository: dwmkerr/openspec-flow
          ref: ${{ github.job_workflow_sha }}

      # Delegate the pipeline to the composite action. The token-mint
      # priority chain (broker → legacy → GITHUB_TOKEN) lives there now;
      # behavior is unchanged for shim consumers.
      - name: Run openspec-flow
        uses: ./
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          app_id: ${{ secrets.OPENSPEC_FLOW_APP_ID }}
          private_key: ${{ secrets.OPENSPEC_FLOW_PRIVATE_KEY }}
          broker_url: ${{ inputs.broker_url }}
          broker_audience: ${{ inputs.broker_audience }}
