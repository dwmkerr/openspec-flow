# =============================================================================
# openspec-flow — reusable workflow (Action mode)
# =============================================================================
# Thin adapter over the same dispatch core the Probot App uses. A target
# repo's shim (.github/workflows/openspec-flow.yml, written by
# `openspec-flow init`) calls this via `uses:` at a pinned ref. This
# workflow checks out openspec-flow at that exact ref, builds it, and
# runs `openspec-flow dispatch`, which classifies the triggering event
# and routes it through the handler registry.
#
# Identity: when OPENSPEC_FLOW_APP_ID / OPENSPEC_FLOW_PRIVATE_KEY are
# provided, an App installation token is minted and commits attribute to
# openspec-flow[bot]. Otherwise the job falls back to GITHUB_TOKEN
# (commits attribute to github-actions[bot]).
# =============================================================================

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        description: Anthropic API key for the Claude agent.
        required: true
      OPENSPEC_FLOW_APP_ID:
        description: GitHub App id for bot identity (optional).
        required: false
      OPENSPEC_FLOW_PRIVATE_KEY:
        description: GitHub App private key for bot identity (optional).
        required: false

  # Direct triggers — a target repo can also vendor this file and run it
  # without the shim layer. The shim's `on:` block mirrors these.
  issues:
    types: [labeled]
  pull_request:
    types: [labeled, closed]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  flow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      # Surface the App id so the conditional token step can gate on it.
      OPENSPEC_FLOW_APP_ID: ${{ secrets.OPENSPEC_FLOW_APP_ID }}
    steps:
      # Mint an App token only when App creds are present. Its output
      # token (if any) is preferred over GITHUB_TOKEN below.
      - name: Mint App token
        id: app-token
        if: ${{ env.OPENSPEC_FLOW_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.OPENSPEC_FLOW_APP_ID }}
          private-key: ${{ secrets.OPENSPEC_FLOW_PRIVATE_KEY }}

      # Check out openspec-flow at the exact ref the shim pinned.
      # job_workflow_sha resolves the reusable workflow's own commit,
      # keeping the runtime code version-coherent with the shim's @ref.
      - name: Checkout openspec-flow
        uses: actions/checkout@v4
        with:
          repository: dwmkerr/openspec-flow
          ref: ${{ github.job_workflow_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Dispatch
        run: node dist/cli.js dispatch
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # GITHUB_EVENT_PATH is set automatically by the runner.
          OPENSPEC_FLOW_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
