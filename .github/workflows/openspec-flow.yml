# =============================================================================
# openspec-flow — reusable workflow (Action mode)
# =============================================================================
# Thin adapter over the same dispatch core the Probot App uses. A target
# repo's shim (.github/workflows/openspec-flow.yml, written by
# `openspec-flow init`) calls this via `uses:` at a pinned ref. This
# workflow checks out openspec-flow at that exact ref, builds it, and
# runs `openspec-flow dispatch`, which classifies the triggering event
# and routes it through the handler registry.
#
# Identity: when OPENSPEC_FLOW_APP_ID / OPENSPEC_FLOW_PRIVATE_KEY are
# provided, an App installation token is minted and commits attribute to
# openspec-flow[bot]. Otherwise the job falls back to GITHUB_TOKEN
# (commits attribute to github-actions[bot]).
# =============================================================================

# workflow_call only. The shim that `openspec-flow init` writes into the
# target repo carries the `on:` event triggers and calls this workflow via
# `uses:`. Keeping this file trigger-less means it never self-executes on
# the openspec-flow repo (whose own flow runs through the App), and the
# event-trigger contract lives in exactly one place — the shim template.
on:
  workflow_call:
    inputs:
      broker_url:
        description: |
          OIDC token broker URL. The shim is rendered with the URL of the
          Probot host that ran the install (Fly dev, Fly prod, or omitted
          for local-dev installs that should use the default below).
          Repo override path: set the `OPENSPEC_FLOW_BROKER_URL` Actions
          variable; that wins over this input.
        type: string
        required: false
        default: 'https://openspec-flow.fly.dev'
    secrets:
      ANTHROPIC_API_KEY:
        description: Anthropic API key for the Claude agent.
        required: true
      OPENSPEC_FLOW_APP_ID:
        description: GitHub App id for bot identity (optional, legacy path).
        required: false
      OPENSPEC_FLOW_PRIVATE_KEY:
        description: GitHub App private key for bot identity (optional, legacy path).
        required: false

jobs:
  flow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Required for the OIDC broker step — without it, the runner
      # does not inject ACTIONS_ID_TOKEN_REQUEST_TOKEN/URL and the
      # curl step fails with `unbound variable`. The caller (shim)
      # also needs id-token: write at its own permissions block;
      # the shim template ships with it.
      id-token: write
    env:
      # Surface the App id so the conditional token step can gate on it.
      OPENSPEC_FLOW_APP_ID: ${{ secrets.OPENSPEC_FLOW_APP_ID }}
    steps:
      # Mint an App token, preferring (in order):
      #   1. OIDC broker exchange — no App secrets in target repo.
      #      Requires OPENSPEC_FLOW_BROKER_URL repo/org variable and
      #      `id-token: write` permission (shim ships with both).
      #   2. Legacy APP_ID + PRIVATE_KEY secrets — older shims.
      # If neither is configured, falls back to GITHUB_TOKEN below
      # (which can't push workflow files — see init PR body).
      # Broker URL resolution (highest priority wins):
      #   1. vars.OPENSPEC_FLOW_BROKER_URL — per-repo (or per-org) override
      #   2. inputs.broker_url — set in the shim at install time (Probot
      #      bakes its public URL in when the install handler runs)
      #   3. reusable workflow's own default (workflow_call input default)
      - name: Mint App token (OIDC broker)
        id: broker-token
        if: ${{ vars.OPENSPEC_FLOW_BROKER_URL != '' || inputs.broker_url != '' }}
        run: |
          set -euo pipefail
          ID_TOKEN=$(curl -sS \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=openspec-flow" \
            | jq -r .value)
          RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer ${ID_TOKEN}" \
            "${BROKER_URL}/api/token")
          APP_TOKEN=$(echo "$RESP" | jq -r .token)
          if [[ "$APP_TOKEN" == "null" || -z "$APP_TOKEN" ]]; then
            echo "broker rejected token request: $RESP" >&2
            exit 1
          fi
          echo "::add-mask::$APP_TOKEN"
          echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
        env:
          BROKER_URL: ${{ vars.OPENSPEC_FLOW_BROKER_URL || inputs.broker_url }}

      - name: Mint App token (legacy secrets)
        id: app-token
        if: ${{ vars.OPENSPEC_FLOW_BROKER_URL == '' && inputs.broker_url == '' && env.OPENSPEC_FLOW_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.OPENSPEC_FLOW_APP_ID }}
          private-key: ${{ secrets.OPENSPEC_FLOW_PRIVATE_KEY }}

      # Check out openspec-flow at the exact ref the shim pinned.
      # job_workflow_sha resolves the reusable workflow's own commit,
      # keeping the runtime code version-coherent with the shim's @ref.
      - name: Checkout openspec-flow
        uses: actions/checkout@v4
        with:
          repository: dwmkerr/openspec-flow
          ref: ${{ github.job_workflow_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      # Handlers shell out to the Fission `openspec` CLI (new change,
      # validate, archive). It is a separate binary from openspec-flow
      # and from the repo's committed openspec-* skills, so the runner
      # must install it explicitly.
      - name: Install OpenSpec CLI
        run: npm i -g @fission-ai/openspec

      - name: Dispatch
        run: node dist/cli.js dispatch
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # GITHUB_EVENT_PATH is set automatically by the runner.
          # Priority: broker (OIDC, no secrets) → legacy App secret → GITHUB_TOKEN.
          OPENSPEC_FLOW_TOKEN: ${{ steps.broker-token.outputs.token || steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ steps.broker-token.outputs.token || steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
