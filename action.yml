# =============================================================================
# openspec-flow — composite action
# =============================================================================
# Runs the dispatch core (event classification + handler registry) as a step
# inside the caller's job. Because a composite action inherits the caller's
# job environment, any ANTHROPIC_* / CLAUDE_* variable the caller sets reaches
# the Agent SDK without a per-variable input — this is how advanced consumers
# route agent traffic through a custom endpoint (e.g. a corporate gateway).
#
# Two ways to consume openspec-flow:
#   1. Reusable workflow (.github/workflows/openspec-flow.yml) — the drop-in
#      path the App and manual shims use. It wraps this action and owns
#      triggers + permissions.
#   2. This action directly — own the job, set `env:` for advanced config.
#      See docs/advanced-configuration.md.
#
# The caller's job must grant `id-token: write` (for the OIDC broker path)
# plus contents/pull-requests/issues `write`; a composite action cannot grant
# job permissions itself.
# =============================================================================
name: openspec-flow
description: Classify a GitHub event and route it through the openspec-flow handler registry.

inputs:
  anthropic_api_key:
    description: Anthropic API key (x-api-key). Provide this or claude_code_oauth_token, or set a credential via job env.
    required: false
  claude_code_oauth_token:
    description: Claude Code OAuth token (subscription auth), alternative to anthropic_api_key.
    required: false
  github_token:
    description: Token used when no App identity is minted. Defaults to the job's GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}
  app_id:
    description: GitHub App id for bot identity (optional, secret-based path).
    required: false
  private_key:
    description: GitHub App private key for bot identity (optional, secret-based path).
    required: false
  oidc_broker_url:
    description: >
      OIDC token broker URL. Exchanges the runner's GitHub OIDC token for
      the openspec-flow[bot] App token (no App private key in your repo).
      Point at your own self-hosted broker to control the minting infra.
      Empty (default) skips the broker and runs as github-actions[bot].
      The `OPENSPEC_FLOW_BROKER_URL` repo/org variable overrides this.
    required: false
    default: ''
  oidc_broker_audience:
    description: The `aud` claim the broker requires on the OIDC token. Only used when a broker URL is set.
    required: false
    default: 'openspec-flow'

runs:
  using: composite
  steps:
    # Mint an App token, preferring the OIDC broker, then the App-secret
    # path, then the github_token fallback. The broker only runs when a URL
    # is set (via the OPENSPEC_FLOW_BROKER_URL variable or oidc_broker_url);
    # otherwise the flow runs as github-actions[bot].
    - name: Mint App token (OIDC broker)
      id: broker-token
      if: ${{ vars.OPENSPEC_FLOW_BROKER_URL != '' || inputs.oidc_broker_url != '' }}
      shell: bash
      run: |
        set -euo pipefail
        ID_TOKEN=$(curl -sS \
          -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${BROKER_AUDIENCE}" \
          | jq -r .value)
        RESP=$(curl -sS -X POST \
          -H "Authorization: Bearer ${ID_TOKEN}" \
          "${BROKER_URL}/api/token")
        APP_TOKEN=$(echo "$RESP" | jq -r .token)
        if [[ "$APP_TOKEN" == "null" || -z "$APP_TOKEN" ]]; then
          echo "openspec-flow OIDC broker at ${BROKER_URL} did not return a token." >&2
          echo "The openspec-flow App is likely not installed on this repo." >&2
          echo "Install it (https://github.com/apps/openspec-flow), or unset the" >&2
          echo "OPENSPEC_FLOW_BROKER_URL variable / oidc_broker_url input to run as" >&2
          echo "github-actions[bot]. Broker response: $RESP" >&2
          exit 1
        fi
        echo "::add-mask::$APP_TOKEN"
        echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
      env:
        BROKER_URL: ${{ vars.OPENSPEC_FLOW_BROKER_URL || inputs.oidc_broker_url }}
        BROKER_AUDIENCE: ${{ vars.OPENSPEC_FLOW_BROKER_AUDIENCE || inputs.oidc_broker_audience }}

    - name: Mint App token (legacy secrets)
      id: app-token
      if: ${{ vars.OPENSPEC_FLOW_BROKER_URL == '' && inputs.oidc_broker_url == '' && inputs.app_id != '' }}
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.private_key }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: ${{ github.action_path }}/package-lock.json

    - name: Build openspec-flow
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        npm ci
        npm run build

    # Handlers shell out to the Fission `openspec` CLI (new change,
    # validate, archive) — a separate binary the runner must install.
    - name: Install OpenSpec CLI
      shell: bash
      run: npm i -g @fission-ai/openspec

    - name: Dispatch
      shell: bash
      run: node "${{ github.action_path }}/dist/cli.js" dispatch
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        # Priority: broker (OIDC, no secrets), then App secret, then github_token.
        OPENSPEC_FLOW_TOKEN: ${{ steps.broker-token.outputs.token || steps.app-token.outputs.token || inputs.github_token }}
        GITHUB_TOKEN: ${{ steps.broker-token.outputs.token || steps.app-token.outputs.token || inputs.github_token }}
        # Credentials: take the `with:` input, or fall back to the same var
        # set on the caller's job env. Either ANTHROPIC_API_KEY or
        # ANTHROPIC_AUTH_TOKEN is sufficient (a gateway supplies the bearer
        # token). The || fallback avoids clobbering an env-supplied value
        # with an empty input.
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key || env.ANTHROPIC_API_KEY }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token || env.CLAUDE_CODE_OAUTH_TOKEN }}
        # Everything else the agent reads (ANTHROPIC_BASE_URL,
        # ANTHROPIC_AUTH_TOKEN, ANTHROPIC_CUSTOM_HEADERS, model overrides,
        # timeouts, ...) is inherited automatically: composite action steps
        # share the caller job's environment. Setting it on the job is enough.
        OPENSPEC_FLOW_APP_INSTALLED: ${{ (steps.broker-token.outputs.token != '' || steps.app-token.outputs.token != '') && 'true' || 'false' }}
