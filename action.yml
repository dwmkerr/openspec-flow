# =============================================================================
# openspec-flow — composite action
# =============================================================================
# Runs the dispatch core (event classification + handler registry) as a step
# inside the caller's job. Because a composite action inherits the caller's
# job environment, any ANTHROPIC_* / CLAUDE_* variable the caller sets reaches
# the Agent SDK without a per-variable input — this is how advanced consumers
# route agent traffic through a custom endpoint (e.g. a corporate gateway).
#
# Two ways to consume openspec-flow:
#   1. Reusable workflow (.github/workflows/openspec-flow.yml) — the drop-in
#      path the App and manual shims use. It wraps this action and owns
#      triggers + permissions.
#   2. This action directly — own the job, set `env:` for advanced config.
#      See docs/advanced-configuration.md.
#
# The caller's job must grant `id-token: write` (for the OIDC broker path)
# plus contents/pull-requests/issues `write`; a composite action cannot grant
# job permissions itself.
# =============================================================================
name: openspec-flow
description: Classify a GitHub event and route it through the openspec-flow handler registry.

inputs:
  anthropic_api_key:
    description: Anthropic API key (x-api-key). Provide this or claude_code_oauth_token, or set a credential via job env.
    required: false
  claude_code_oauth_token:
    description: Claude Code OAuth token (subscription auth), alternative to anthropic_api_key.
    required: false
  github_token:
    description: Token used when no App identity is minted. Defaults to the job's GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}
  app_id:
    description: GitHub App id for bot identity (optional, secret-based path).
    required: false
  private_key:
    description: GitHub App private key for bot identity (optional, secret-based path).
    required: false
  broker_url:
    description: OIDC token broker URL. The `OPENSPEC_FLOW_BROKER_URL` repo/org variable overrides this.
    required: false
    default: ''
  broker_audience:
    description: The `aud` claim the broker requires on the OIDC token.
    required: false
    default: 'openspec-flow'

runs:
  using: composite
  steps:
    # Mint an App token, preferring the OIDC broker, then the App-secret
    # path, then the github_token fallback. Broker URL resolution (highest
    # priority wins): vars.OPENSPEC_FLOW_BROKER_URL, then inputs.broker_url.
    - name: Mint App token (OIDC broker)
      id: broker-token
      if: ${{ vars.OPENSPEC_FLOW_BROKER_URL != '' || inputs.broker_url != '' }}
      shell: bash
      run: |
        set -euo pipefail
        ID_TOKEN=$(curl -sS \
          -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${BROKER_AUDIENCE}" \
          | jq -r .value)
        RESP=$(curl -sS -X POST \
          -H "Authorization: Bearer ${ID_TOKEN}" \
          "${BROKER_URL}/api/token")
        APP_TOKEN=$(echo "$RESP" | jq -r .token)
        if [[ "$APP_TOKEN" == "null" || -z "$APP_TOKEN" ]]; then
          echo "broker rejected token request: $RESP" >&2
          exit 1
        fi
        echo "::add-mask::$APP_TOKEN"
        echo "token=$APP_TOKEN" >> "$GITHUB_OUTPUT"
      env:
        BROKER_URL: ${{ vars.OPENSPEC_FLOW_BROKER_URL || inputs.broker_url }}
        BROKER_AUDIENCE: ${{ vars.OPENSPEC_FLOW_BROKER_AUDIENCE || inputs.broker_audience }}

    - name: Mint App token (legacy secrets)
      id: app-token
      if: ${{ vars.OPENSPEC_FLOW_BROKER_URL == '' && inputs.broker_url == '' && inputs.app_id != '' }}
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.private_key }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: ${{ github.action_path }}/package-lock.json

    - name: Build openspec-flow
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        npm ci
        npm run build

    # Handlers shell out to the Fission `openspec` CLI (new change,
    # validate, archive) — a separate binary the runner must install.
    - name: Install OpenSpec CLI
      shell: bash
      run: npm i -g @fission-ai/openspec

    - name: Dispatch
      shell: bash
      run: node "${{ github.action_path }}/dist/cli.js" dispatch
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        # Priority: broker (OIDC, no secrets), then App secret, then github_token.
        OPENSPEC_FLOW_TOKEN: ${{ steps.broker-token.outputs.token || steps.app-token.outputs.token || inputs.github_token }}
        GITHUB_TOKEN: ${{ steps.broker-token.outputs.token || steps.app-token.outputs.token || inputs.github_token }}
        # Credentials. Either is sufficient; a gateway may supply a bearer
        # token via the ambient ANTHROPIC_AUTH_TOKEN env instead.
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.claude_code_oauth_token }}
        # Config passthrough from the caller's job env. The Agent SDK reads
        # these directly; openspec-flow adds no routing logic. Curated
        # allowlist — the whole caller env is NOT forwarded.
        ANTHROPIC_BASE_URL: ${{ env.ANTHROPIC_BASE_URL }}
        ANTHROPIC_AUTH_TOKEN: ${{ env.ANTHROPIC_AUTH_TOKEN }}
        ANTHROPIC_CUSTOM_HEADERS: ${{ env.ANTHROPIC_CUSTOM_HEADERS }}
        OPENSPEC_FLOW_APP_INSTALLED: ${{ (steps.broker-token.outputs.token != '' || steps.app-token.outputs.token != '') && 'true' || 'false' }}
