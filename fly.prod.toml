# Production Fly app for openspec-flow.
#
# Deployed automatically when release-please cuts a tag (see
# .github/workflows/cicd.yaml). Manual fallback:
#   flyctl deploy --config fly.prod.toml -a openspec-flow

app = 'openspec-flow'
primary_region = 'lhr'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOST = '0.0.0.0'
  OPENSPEC_FLOW_DISPATCH_MODE = 'action'
  PORT = '3000'
  # Baked into the shim at install time so target repos auto-point
  # at this host as their broker.
  OPENSPEC_FLOW_BROKER_PUBLIC_URL = 'https://openspec-flow.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  # Auto-stop after idle. One cold-start per session (~3-5s) then
  # warm for the rest of the user's flow; dwarfed by the 30s runner
  # cold-start downstream. Saves ~$4/mo on two HA machines.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
